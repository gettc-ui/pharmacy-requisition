<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเบิกจ่ายยา - Requisition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Sarabun', sans-serif; }
        .table-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        /* การจัด Header และ Body ให้ตรงกันเป๊ะ */
        .table thead th { background-color: #0d6efd; color: white; border: none; text-align: center; }
        .table td { vertical-align: middle; text-align: center; border-bottom: 1px solid #dee2e6; }
        .drug-name { text-align: left !important; font-weight: bold; }
        .status-low { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">รายการใบเบิกยา (Requisition List)</h2>
        
        <div class="table-container">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th style="width: 10%;">รหัสยา</th>
                        <th style="width: 40%;">ชื่อยา</th>
                        <th style="width: 15%;">คงเหลือ</th>
                        <th style="width: 15%;">หน่วย</th>
                        <th style="width: 20%;">ดำเนินการ</th>
                    </tr>
                </thead>
                <tbody id="drug-list">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // แทนที่ด้วย Web App URL ที่ได้จากขั้นตอนการ Deploy GAS
        const API_URL = "https://script.google.com/macros/s/AKfycbzFuvpbNjRBmjVAtJQ1zUrBKXH1gK1Wf_S4INWfrFnsWkd1HCA0tCLmuOphGUOrxOrt/exec";

        async function loadDrugs() {
            const response = await fetch(API_URL);
            const drugs = await response.json();
            const list = document.getElementById('drug-list');
            
            list.innerHTML = drugs.map(drug => `
                <tr>
                    <td>${drug.internal_id}</td>
                    <td class="drug-name">${drug.name} <br><small class="text-muted">${drug.trade_name || ''}</small></td>
                    <td class="${drug.current_stock <= drug.rop ? 'status-low' : ''}">${drug.current_stock}</td>
                    <td>${drug.unit}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="requestDrug('${drug.internal_id}')">เลือกเบิก</button>
                    </td>
                </tr>
            `).join('');
        }

        window.onload = loadDrugs;
    </script>
</body>
</html>
