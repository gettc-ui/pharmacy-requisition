<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHARMACY V2 - Professional System</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --prm: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); color: #1e293b; font-size: 14px; }
        .navbar { background: #fff; border-bottom: 1px solid #e2e8f0; }
        .nav-link { color: #64748b; font-weight: 600; cursor: pointer; padding: 1rem 1.5rem !important; }
        .nav-link.active { color: var(--prm) !important; border-bottom: 3px solid var(--prm); }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); background: #fff; }
        .btn-prm { background: var(--prm); color: white; border-radius: 8px; font-weight: 600; border: none; padding: 10px 25px; transition: 0.2s; }
        .btn-prm:hover { background: #1d4ed8; transform: translateY(-1px); }
        .form-label { font-weight: 600; color: #475569; font-size: 13px; }
        .form-control:read-only { background-color: #f1f5f9; cursor: not-allowed; }
        .master-tab { cursor: pointer; padding: 10px 20px; border-radius: 10px; margin-right: 8px; background: #e2e8f0; font-weight: 600; transition: 0.2s; }
        .master-tab.active { background: var(--prm); color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand navbar-light sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="#"><i class="bi bi-capsule-pill"></i> PHARMACY V2</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link px-3" onclick="switchTab('procure', this)">สร้างใบขอสนับสนุน</a>
            <a class="nav-link px-3 active" onclick="switchTab('master', this)">จัดการข้อมูลหลัก</a>
        </div>
    </div>
</nav>

<div class="container mt-4 pb-5">
    <!-- หน้าใบขอสนับสนุน -->
    <div id="page-procure" class="page-content" style="display:none;">
        <div class="card p-4">
            <h5 class="fw-bold mb-4 text-primary"><i class="bi bi-file-earmark-medical"></i> บันทึกใบขอสนับสนุนยา (Support Request)</h5>
            <div class="row g-3 mb-4">
                <div class="col-md-3"><label class="form-label">วันที่เอกสาร</label><input type="date" id="docDate" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">หน่วยงานเจ้าของเรื่อง</label><input type="text" id="docDept" class="form-control" placeholder="ระบุชื่อหน่วยงาน"></div>
                <div class="col-md-5"><label class="form-label">ปลายทาง</label><select id="docDest" class="form-select"><option>คลังใหญ่ รพ.แม่ข่าย</option><option>ห้องจ่ายยา รพ.แม่ข่าย</option></select></div>
            </div>
            <div class="table-responsive">
                <table class="table table-bordered align-middle" id="supportTable">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 45%;">รายการยาสามัญ (Generic Name)</th>
                            <th>คงคลังปัจจุบัน</th>
                            <th>ใช้/เดือน</th>
                            <th>จำนวนขอสนับสนุน</th>
                            <th style="width: 50px;"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- แถวข้อมูลจะว่างเปล่า จนกว่าจะกดปุ่มเพิ่ม -->
                    </tbody>
                </table>
            </div>
            <button class="btn btn-outline-primary btn-sm mb-4" onclick="addSupportRow()"><i class="bi bi-plus-lg"></i> เพิ่มรายการยา</button>
            <div class="text-end border-top pt-3">
                <button class="btn btn-prm px-5" id="btnSubmitSupport" onclick="submitSupport()">ยืนยันบันทึกใบขอสนับสนุน</button>
            </div>
        </div>
    </div>

    <!-- หน้าจัดการข้อมูลหลัก -->
    <div id="page-master" class="page-content">
        <div class="d-flex mb-4 overflow-auto pb-2">
            <div class="master-tab active" onclick="switchMaster('generic', this)">1. ยาหลัก (Generic)</div>
            <div class="master-tab" onclick="switchMaster('trade', this)">2. ยี่ห้อ (Trade Name)</div>
            <div class="master-tab" onclick="switchMaster('company', this)">3. บริษัท</div>
            <div class="master-tab" onclick="switchMaster('user', this)">4. ผู้ใช้งาน</div>
        </div>

        <div id="master-content">
            <!-- 2.1 ยาหลัก -->
            <div id="m-generic" class="m-view">
                <div class="card p-4">
                    <h5 class="fw-bold mb-4 text-primary">ยาหลัก (Generic Master)</h5>
                    <form onsubmit="saveMaster(event, 'save_generic')">
                        <div class="row g-3">
                            <div class="col-md-3"><label class="form-label">Internal ID</label><input class="form-control" placeholder="รัน DRG-xxxx อัตโนมัติ" readonly></div>
                            <div class="col-md-6"><label class="form-label">ชื่อยาสามัญ</label><input name="generic_name" class="form-control" required></div>
                            <div class="col-md-3"><label class="form-label">ความแรง</label><input name="strength" class="form-control" required></div>
                            <div class="col-md-3"><label class="form-label">รูปแบบยา</label><select name="dosage_form" class="form-select"><option>Tablet</option><option>Capsule</option><option>Syrup</option><option>Injection</option></select></div>
                            <div class="col-md-3"><label class="form-label">หน่วยนับ</label><input name="unit" class="form-control" required></div>
                            <div class="col-md-3"><label class="form-label">ประเภท</label><select name="drug_class" class="form-select"><option>รพ.สต.</option><option>PCU</option><option>วัสดุเภสัชกรรม</option></select></div>
                            <div class="col-md-3"><label class="form-label">DMSIC Type</label><select name="dmsic_type" class="form-select"><option>ยาแผนปัจจุบัน (ตลาด)</option><option>ยาได้รับสนับสนุน</option><option>ยาผลิตเอง</option></select></div>
                            <div class="col-md-3"><label class="form-label">NELM Class</label><select name="nelm_class" class="form-select" onchange="updateNelmSub(this.value)"><option value="ED">ED</option><option value="NED">NED</option><option value="PS">PS</option></select></div>
                            <div class="col-md-3"><label class="form-label">NELM Sub</label><select name="nelm_subclass" id="nelm-sub" class="form-select"></select></div>
                            <div class="col-md-6"><label class="form-label">GPU Code</label><input name="gpu_code" class="form-control" maxlength="10"></div>
                            <div class="col-md-3"><label class="form-label">ROP</label><input type="number" name="rop" class="form-control" value="0"></div>
                            <div class="col-md-3"><label class="form-label">Safety Stock</label><input type="number" name="safety_stock" class="form-control" value="0"></div>
                            <div class="col-12 text-end mt-4"><button type="submit" class="btn btn-prm">บันทึกยาหลัก</button></div>
                        </div>
                    </form>
                </div>
            </div>
            <!-- 2.2 ยี่ห้อ -->
            <div id="m-trade" class="m-view" style="display:none;">
                <div class="card p-4">
                    <h5 class="fw-bold mb-4 text-primary">ชื่อการค้า (Trade Name)</h5>
                    <form onsubmit="saveMaster(event, 'save_trade')">
                        <div class="row g-3">
                            <div class="col-md-3"><label class="form-label">Trade Code</label><input class="form-control" placeholder="รัน TRD-xxxx อัตโนมัติ" readonly></div>
                            <div class="col-md-9"><label class="form-label">เลือกยาหลัก</label><select name="internal_id" id="sel-gen" class="form-select" required></select></div>
                            <div class="col-md-6"><label class="form-label">ชื่อยี่ห้อ</label><input name="trade_name" class="form-control" required></div>
                            <div class="col-md-3"><label class="form-label">TPU Code</label><input name="tpu_code" class="form-control" maxlength="10"></div>
                            <div class="col-md-3"><label class="form-label">บริษัท</label><select name="manufact_id" id="sel-com" class="form-select" required></select></div>
                            <div class="col-12 text-end mt-4"><button type="submit" class="btn btn-prm">บันทึกยี่ห้อ</button></div>
                        </div>
                    </form>
                </div>
            </div>
            <!-- 2.3 บริษัท -->
            <div id="m-company" class="m-view" style="display:none;">
                <div class="card p-4">
                    <h5 class="fw-bold mb-4 text-primary">ข้อมูลบริษัท</h5>
                    <form onsubmit="saveMaster(event, 'save_company')">
                        <div class="row g-3">
                            <div class="col-md-3"><label class="form-label">Manufact ID</label><input class="form-control" placeholder="รัน COM-xxxx อัตโนมัติ" readonly></div>
                            <div class="col-md-9"><label class="form-label">ชื่อบริษัท</label><input name="company_name" class="form-control" required></div>
                            <div class="col-12"><label class="form-label">หมายเหตุ</label><textarea name="note" class="form-control" rows="2"></textarea></div>
                            <div class="col-12 text-end mt-4"><button type="submit" class="btn btn-prm">บันทึกบริษัท</button></div>
                        </div>
                    </form>
                </div>
            </div>
            <!-- 2.4 ผู้ใช้งาน -->
            <div id="m-user" class="m-view" style="display:none;">
                <div class="card p-4">
                    <h5 class="fw-bold mb-4 text-primary">ผู้ใช้งาน</h5>
                    <form onsubmit="saveMaster(event, 'save_user')">
                        <div class="row g-3">
                            <div class="col-md-3"><label class="form-label">User ID</label><input class="form-control" placeholder="รัน USR-xxxx อัตโนมัติ" readonly></div>
                            <div class="col-md-5"><label class="form-label">ชื่อ-นามสกุล</label><input name="full_name" class="form-control" required></div>
                            <div class="col-md-4"><label class="form-label">หน่วยงาน</label><input name="department" class="form-control" required></div>
                            <div class="col-md-4"><label class="form-label">Username</label><input name="username" class="form-control" required></div>
                            <div class="col-md-4"><label class="form-label">Password</label><input type="password" name="password" class="form-control" required></div>
                            <div class="col-md-4"><label class="form-label">สิทธิ์</label><select name="role" class="form-select"><option value="PHARMACIST">คลังยา</option><option value="NURSE">พยาบาล</option></select></div>
                            <input type="hidden" name="status" value="ACTIVE">
                            <div class="col-12 text-end mt-4"><button type="submit" class="btn btn-prm">สร้างผู้ใช้งาน</button></div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // *** สำคัญ: นำ URL ของ Apps Script ล่าสุดมาวางที่นี่ ***
    const API = "https://script.google.com/macros/s/AKfycbzFuvpbNjRBmjVAtJQ1zUrBKXH1gK1Wf_S4INWfrFnsWkd1HCA0tCLmuOphGUOrxOrt/exec"; 
    
    let db = { drugs:[], trades:[], companies:[], users:[] };

    window.onload = () => { 
        document.getElementById('docDate').valueAsDate = new Date();
        initData(); 
        updateNelmSub('ED'); 
    };

    async function initData() {
        try {
            const res = await fetch(API + "?page=init_data");
            db = await res.json();
            renderDropdowns();
        } catch(e) { console.error("Data Load Error", e); }
    }

    function renderDropdowns() {
        if (db.drugs && db.drugs.length > 0) {
            const drugOpts = db.drugs.map(d => {
                const name = d.generic_name || d.generic_Name || d.Generic_Name || "Unknown";
                const strength = d.strength || d.Strength || "";
                return `<option value="${d.internal_id || d.Internal_ID}">${name} ${strength}</option>`;
            }).join('');
            const selGen = document.getElementById('sel-gen');
            if (selGen) selGen.innerHTML = drugOpts;
        }

        if (db.companies && db.companies.length > 0) {
            const compOpts = db.companies.map(c => 
                `<option value="${c.manufact_id || c.Manufact_ID}">${c.company_name || c.Company_Name}</option>`
            ).join('');
            const selCom = document.getElementById('sel-com');
            if (selCom) selCom.innerHTML = compOpts;
        }
    }

    // --- ส่วนของใบขอสนับสนุน ---
    function addSupportRow() {
        if (!db.drugs || db.drugs.length === 0) {
            return alert("ไม่มีข้อมูลยาหลักในระบบ กรุณาบันทึกข้อมูลหลักก่อนครับ");
        }
        
        const tbody = document.querySelector('#supportTable tbody');
        const drugOpts = db.drugs.map(d => {
            const name = d.generic_name || d.generic_Name || d.Generic_Name || "Unknown";
            const strength = d.strength || d.Strength || "";
            return `<option value="${d.internal_id || d.Internal_ID}">${name} ${strength}</option>`;
        }).join('');

        const row = document.createElement('tr');
        row.innerHTML = `
            <td>
                <select class="form-select drug-select" onchange="updateRowStats(this)">
                    <option value="">-- เลือกรายการยา --</option>
                    ${drugOpts}
                </select>
            </td>
            <td><input type="number" class="form-control stock-field" value="0" readonly></td>
            <td><input type="number" class="form-control usage-field" value="0" readonly></td>
            <td><input type="number" class="form-control req-field" value="0" min="1"></td>
            <td><button class="btn btn-link text-danger p-0" onclick="this.closest('tr').remove()"><i class="bi bi-trash"></i></button></td>
        `;
        tbody.appendChild(row);
    }

    async function updateRowStats(selectEl) {
        const internalId = selectEl.value;
        const row = selectEl.closest('tr');
        const stockInput = row.querySelector('.stock-field');
        const usageInput = row.querySelector('.usage-field');

        if (!internalId) {
            stockInput.value = 0;
            usageInput.value = 0;
            return;
        }

        stockInput.value = "...";
        usageInput.value = "...";

        try {
            const res = await fetch(`${API}?page=get_drug_stats&internal_id=${internalId}`);
            const data = await res.json();
            stockInput.value = data.current_stock;
            usageInput.value = data.monthly_usage;
        } catch (e) {
            stockInput.value = 0;
            usageInput.value = 0;
        }
    }

    async function submitSupport() {
        const tbody = document.querySelector('#supportTable tbody');
        if (tbody.rows.length === 0) return alert("กรุณาเพิ่มรายการยาอย่างน้อย 1 รายการ");

        const btn = document.getElementById('btnSubmitSupport');
        btn.disabled = true;
        btn.innerText = "กำลังบันทึก...";

        const items = [];
        for (let row of tbody.rows) {
            const drugId = row.querySelector('.drug-select').value;
            const qty = parseInt(row.querySelector('.req-field').value);
            if (!drugId || isNaN(qty) || qty <= 0) continue; // ข้ามบรรทัดที่ไม่ได้เลือกยาหรือจำนวนไม่ถูกต้อง

            items.push({
                internal_id: drugId,
                qty: qty,
                note: "คงคลัง:" + row.querySelector('.stock-field').value + " ใช้/ด:" + row.querySelector('.usage-field').value
            });
        }

        if (items.length === 0) {
            btn.disabled = false;
            btn.innerText = "ยืนยันบันทึกใบขอสนับสนุน";
            return alert("กรุณาระบุจำนวนที่ต้องการขอสนับสนุนให้ถูกต้อง");
        }

        const payload = {
            action: "save_support_request",
            payload: {
                items: items,
                department: document.getElementById('docDept').value,
                source_dest: document.getElementById('docDest').value
            }
        };

        try {
            const res = await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.status === 'success') {
                alert("บันทึกสำเร็จ! เลขที่ใบขอสนับสนุน: " + result.doc_no);
                tbody.innerHTML = ""; // ล้างตารางหลังบันทึกเสร็จ
            } else {
                alert("บันทึกไม่สำเร็จ: " + result.message);
            }
        } catch (e) {
            alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
        } finally {
            btn.disabled = false;
            btn.innerText = "ยืนยันบันทึกใบขอสนับสนุน";
        }
    }

    // --- ส่วนควบคุมแท็บ ---
    function switchTab(tab, el) {
        document.querySelectorAll('.page-content').forEach(p => p.style.display = 'none');
        document.getElementById('page-' + tab).style.display = 'block';
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        renderDropdowns(); // รีเฟรชเผื่อมีข้อมูลใหม่
    }

    function switchMaster(sub, el) {
        document.querySelectorAll('.m-view').forEach(v => v.style.display = 'none');
        document.getElementById('m-' + sub).style.display = 'block';
        document.querySelectorAll('.master-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    function updateNelmSub(val) {
        const sel = document.getElementById('nelm-sub');
        if (!sel) return;
        sel.innerHTML = '';
        let opts = (val === 'ED') ? ['b','s','ex','R1','R2'] : (val === 'NED' ? ['NED'] : (val === 'PS' ? ['PS'] : ['Other']));
        opts.forEach(o => sel.add(new Option(o, o)));
    }

    async function saveMaster(e, action) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        const oldTxt = btn.innerText;
        btn.innerText = "กำลังบันทึก..."; btn.disabled = true;
        
        const formData = new FormData(e.target);
        const payload = Object.fromEntries(formData.entries());

        try {
            const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action, payload }) });
            const result = await res.json();
            if(result.status === 'success') {
                alert("บันทึกข้อมูลสำเร็จ! รหัสคือ: " + result.new_id);
                e.target.reset();
                await initData(); 
            } else {
                alert("เกิดข้อผิดพลาด: " + result.message);
            }
        } catch (err) { 
            alert("ไม่สามารถติดต่อเซิร์ฟเวอร์ได้"); 
        } finally { 
            btn.innerText = oldTxt; btn.disabled = false; 
        }
    }
</script>
</body>
</html>
