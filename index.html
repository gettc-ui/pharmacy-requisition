<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHARMACY V2 - Full System</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --prm: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); font-size: 14px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn-prm { background: var(--prm); color: white; border-radius: 8px; font-weight: 600; border: none; padding: 10px 20px; }
        .nav-link { cursor: pointer; font-weight: 600; color: #64748b; }
        .nav-link.active { color: var(--prm) !important; border-bottom: 3px solid var(--prm); }
        .form-label { font-weight: 600; color: #475569; font-size: 13px; }
        .master-tab { cursor: pointer; padding: 8px 16px; border-radius: 8px; margin-right: 8px; background: #e2e8f0; font-weight: 600; }
        .master-tab.active { background: var(--prm); color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand navbar-light bg-white sticky-top border-bottom shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold text-primary"><i class="bi bi-capsule-pill"></i> PHARMACY V2</span>
        <div class="navbar-nav ms-auto">
            <a class="nav-link px-3" onclick="switchTab('procure', this)">สร้างใบขอสนับสนุน</a>
            <a class="nav-link px-3 active" onclick="switchTab('master', this)">จัดการข้อมูลหลัก</a>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <!-- หน้า 1: สร้างใบขอสนับสนุน -->
    <div id="page-procure" class="page-content" style="display:none;">
        <div class="card p-4">
            <h5 class="fw-bold mb-4 text-primary"><i class="bi bi-file-earmark-plus"></i> บันทึกใบขอสนับสนุนยา (จาก รพ.แม่ข่าย)</h5>
            <div class="row g-3 mb-4">
                <div class="col-md-3"><label class="form-label">วันที่</label><input type="date" id="docDate" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">หน่วยงานเจ้าของเรื่อง</label><input type="text" id="docDept" class="form-control" placeholder="ระบุหน่วยงาน"></div>
                <div class="col-md-5"><label class="form-label">ปลายทาง</label><select id="docDest" class="form-select"><option>คลังใหญ่ รพ.แม่ข่าย</option><option>ห้องจ่ายยา รพ.แม่ข่าย</option></select></div>
            </div>
            <table class="table table-bordered align-middle" id="supportTable">
                <thead class="table-light">
                    <tr>
                        <th style="width: 40%;">รายการยาสามัญ</th>
                        <th>คงคลัง</th>
                        <th>ใช้/เดือน</th>
                        <th>ขอสนับสนุน</th>
                        <th style="width: 50px;"></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <button class="btn btn-outline-secondary btn-sm mb-4" onclick="addSupportRow()"><i class="bi bi-plus-circle"></i> เพิ่มรายการยา</button>
            <div class="text-end"><button class="btn btn-prm px-5" onclick="alert('ระบบบันทึกกำลังพัฒนา...')">บันทึกและสร้าง PDF</button></div>
        </div>
    </div>

    <!-- หน้า 2: จัดการข้อมูลหลัก (ครบทุกช่อง) -->
    <div id="page-master" class="page-content">
        <div class="d-flex mb-4 overflow-auto pb-2">
            <div class="master-tab active" onclick="switchMaster('generic', this)">1. ยาหลัก (Generic)</div>
            <div class="master-tab" onclick="switchMaster('trade', this)">2. ยี่ห้อ (Trade Name)</div>
            <div class="master-tab" onclick="switchMaster('company', this)">3. บริษัท</div>
            <div class="master-tab" onclick="switchMaster('user', this)">4. ผู้ใช้งาน</div>
        </div>

        <div id="master-content">
            <!-- 2.1 ฟอร์มยาหลัก (ครบ 12 ฟิลด์ตาม Sheet) -->
            <div id="m-generic" class="m-view">
                <div class="card p-4">
                    <h5 class="fw-bold mb-4">บันทึกข้อมูลยาหลัก (Generic Master)</h5>
                    <form onsubmit="saveMaster(event, 'save_generic')">
                        <div class="row g-3">
                            <div class="col-md-3"><label class="form-label">Internal ID</label><input class="form-control" placeholder="รันอัตโนมัติ" readonly></div>
                            <div class="col-md-6"><label class="form-label">ชื่อยาสามัญ (Generic Name)</label><input name="generic_name" class="form-control" required></div>
                            <div class="col-md-3"><label class="form-label">ความแรง (Strength)</label><input name="strength" class="form-control" required></div>
                            <div class="col-md-3"><label class="form-label">รูปแบบยา (Dosage Form)</label><select name="dosage_form" class="form-select"><option>Tablet</option><option>Capsule</option><option>Syrup</option><option>Injection</option><option>External</option></select></div>
                            <div class="col-md-3"><label class="form-label">หน่วยนับ (Unit)</label><input name="unit" class="form-control" required></div>
                            <div class="col-md-3"><label class="form-label">ประเภท (Drug Class)</label><select name="drug_class" class="form-select"><option>รพ.สต.</option><option>PCU</option><option>วัสดุทางเภสัชกรรม</option><option>อื่นๆ</option></select></div>
                            <div class="col-md-3"><label class="form-label">DMSIC Type</label><select name="dmsic_type" class="form-select"><option>ยาแผนปัจจุบัน (ตลาด)</option><option>ยาได้รับสนับสนุน</option><option>ยาผลิตเอง</option></select></div>
                            <div class="col-md-3"><label class="form-label">บัญชียา (NELM Class)</label><select name="nelm_class" class="form-select" onchange="updateNelmSub(this.value)"><option value="ED">ED</option><option value="NED">NED</option><option value="PS">PS</option><option value="Other">Other</option></select></div>
                            <div class="col-md-3"><label class="form-label">NELM Subclass</label><select name="nelm_subclass" id="nelm-sub" class="form-select"></select></div>
                            <div class="col-md-6"><label class="form-label">รหัส GPU (10 หลัก)</label><input name="gpu_code" class="form-control" maxlength="10"></div>
                            <div class="col-md-3"><label class="form-label">จุดสั่งซื้อ (ROP)</label><input type="number" name="rop" class="form-control" value="0"></div>
                            <div class="col-md-3"><label class="form-label">Safety Stock</label><input type="number" name="safety_stock" class="form-control" value="0"></div>
                            <div class="col-12 text-end mt-4"><button type="submit" class="btn btn-prm">บันทึกยาหลัก</button></div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 2.2 ฟอร์มยี่ห้อ (TPU/Manufact) -->
            <div id="m-trade" class="m-view" style="display:none;">
                <div class="card p-4">
                    <h5 class="fw-bold mb-4">ผูกชื่อทางการค้า (Trade Name)</h5>
                    <form onsubmit="saveMaster(event, 'save_trade')">
                        <div class="row g-3">
                            <div class="col-md-3"><label class="form-label">Trade Code</label><input class="form-control" placeholder="รันอัตโนมัติ" readonly></div>
                            <div class="col-md-9"><label class="form-label">เลือกยาหลัก</label><select name="internal_id" id="sel-gen" class="form-select" required></select></div>
                            <div class="col-md-6"><label class="form-label">ชื่อทางการค้า</label><input name="trade_name" class="form-control" required></div>
                            <div class="col-md-3"><label class="form-label">รหัส TPU (10 หลัก)</label><input name="tpu_code" class="form-control" maxlength="10"></div>
                            <div class="col-md-3"><label class="form-label">บริษัทผู้ผลิต</label><select name="manufact_id" id="sel-com" class="form-select" required></select></div>
                            <div class="col-12 text-end mt-4"><button type="submit" class="btn btn-prm">บันทึกยี่ห้อ</button></div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 2.3 ฟอร์มบริษัท (ID/Name/Note) -->
            <div id="m-company" class="m-view" style="display:none;">
                <div class="card p-4">
                    <h5 class="fw-bold mb-4">จัดการข้อมูลบริษัท</h5>
                    <form onsubmit="saveMaster(event, 'save_company')">
                        <div class="row g-3">
                            <div class="col-md-3"><label class="form-label">Manufact ID</label><input class="form-control" placeholder="รันอัตโนมัติ" readonly></div>
                            <div class="col-md-9"><label class="form-label">ชื่อบริษัท</label><input name="company_name" class="form-control" required></div>
                            <div class="col-12"><label class="form-label">หมายเหตุ</label><textarea name="note" class="form-control" rows="2"></textarea></div>
                            <div class="col-12 text-end mt-4"><button type="submit" class="btn btn-prm">บันทึกบริษัท</button></div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 2.4 ฟอร์มผู้ใช้งาน -->
            <div id="m-user" class="m-view" style="display:none;">
                <div class="card p-4">
                    <h5 class="fw-bold mb-4">จัดการผู้ใช้งาน</h5>
                    <form onsubmit="saveMaster(event, 'save_user')">
                        <div class="row g-3">
                            <div class="col-md-3"><label class="form-label">User ID</label><input class="form-control" placeholder="รันอัตโนมัติ" readonly></div>
                            <div class="col-md-5"><label class="form-label">ชื่อ-นามสกุล</label><input name="full_name" class="form-control" required></div>
                            <div class="col-md-4"><label class="form-label">วอร์ด/แผนก</label><input name="department" class="form-control" required></div>
                            <div class="col-md-4"><label class="form-label">Username</label><input name="username" class="form-control" required></div>
                            <div class="col-md-4"><label class="form-label">Password</label><input type="password" name="password" class="form-control" required></div>
                            <div class="col-md-4"><label class="form-label">สิทธิ์</label><select name="role" class="form-select"><option value="PHARMACIST">Pharmacist</option><option value="NURSE">Nurse</option></select></div>
                            <input type="hidden" name="status" value="ACTIVE">
                            <div class="col-12 text-end mt-4"><button type="submit" class="btn btn-prm">บันทึกผู้ใช้</button></div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzFuvpbNjRBmjVAtJQ1zUrBKXH1gK1Wf_S4INWfrFnsWkd1HCA0tCLmuOphGUOrxOrt/exec"; 
    let db = { drugs:[], trades:[], companies:[], users:[] };

    window.onload = () => { initData(); updateNelmSub('ED'); };

    async function initData() {
        const res = await fetch(API + "?page=init_data");
        db = await res.json();
        renderDropdowns();
    }

    function renderDropdowns() {
        if(db.drugs.length > 0) {
            const opts = db.drugs.map(d => `<option value="${d.internal_id}">${d.generic_name} ${d.strength}</option>`).join('');
            document.getElementById('sel-gen').innerHTML = opts;
        }
        if(db.companies.length > 0) {
            const opts = db.companies.map(c => `<option value="${c.manufact_id}">${c.company_name}</option>`).join('');
            document.getElementById('sel-com').innerHTML = opts;
        }
    }

    // แก้ไข: เลือกยาในหน้าขอสนับสนุนให้ขึ้น
    function addSupportRow() {
        const tbody = document.querySelector('#supportTable tbody');
        const row = document.createElement('tr');
        const drugOptions = db.drugs.map(d => `<option value="${d.internal_id}">${d.generic_name} ${d.strength}</option>`).join('');
        
        row.innerHTML = `
            <td><select class="form-select">${drugOptions}</select></td>
            <td><input type="number" class="form-control" value="0"></td>
            <td><input type="number" class="form-control" value="0"></td>
            <td><input type="number" class="form-control" value="0"></td>
            <td><button class="btn btn-link text-danger p-0" onclick="this.closest('tr').remove()"><i class="bi bi-trash"></i></button></td>
        `;
        tbody.appendChild(row);
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.page-content').forEach(p => p.style.display = 'none');
        document.getElementById('page-' + tab).style.display = 'block';
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        if(tab === 'procure' && document.querySelector('#supportTable tbody').rows.length === 0) addSupportRow();
    }

    function switchMaster(sub, el) {
        document.querySelectorAll('.m-view').forEach(v => v.style.display = 'none');
        document.getElementById('m-' + sub).style.display = 'block';
        document.querySelectorAll('.master-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    function updateNelmSub(val) {
        const sel = document.getElementById('nelm-sub');
        sel.innerHTML = '';
        let opts = (val === 'ED') ? ['b','s','ex','R1','R2'] : (val === 'NED' ? ['NED'] : (val === 'PS' ? ['PS'] : ['Other']));
        opts.forEach(o => sel.add(new Option(o, o)));
    }

    async function saveMaster(e, action) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true;
        const payload = Object.fromEntries(new FormData(e.target).entries());
        try {
            const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action, payload }) });
            const result = await res.json();
            if(result.status === 'success') {
                alert("บันทึกสำเร็จ! เลขที่: " + result.new_id);
                e.target.reset();
                initData();
            }
        } catch (err) { alert("ล้มเหลว: " + err); }
        finally { btn.disabled = false; }
    }
</script>
</body>
</html>
