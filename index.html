    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-color: #2563eb; /* Blue Modern */
            --bg-body: #f8fafc;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-body); color: #1e293b; }
        
        /* Sidebar สำหรับ PC, Bottom Nav สำหรับ Mobile */
        .navbar-brand { font-weight: 700; color: var(--primary-color) !important; }
        .card { border: none; border-radius: 12px; box-shadow: var(--card-shadow); margin-bottom: 1.5rem; }
        .nav-tabs { border: none; }
        .nav-link { border: none !important; color: #64748b; font-weight: 600; padding: 1rem 1.5rem; }
        .nav-link.active { color: var(--primary-color) !important; border-bottom: 3px solid var(--primary-color) !important; background: transparent !important; }
        
        /* Table Customization ให้เป๊ะตามความต้องการพยาบาลและคลัง */
        .table thead th { background-color: #f1f5f9; color: #475569; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; text-align: center; }
        .table td { vertical-align: middle; text-align: center; }
        .text-left { text-align: left !important; }
        
        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .btn-text { display: none; } /* ซ่อนตัวหนังสือปุ่มในมือถือ เหลือแต่ไอคอน */
            .table-responsive { border: 0; }
        }
    </style>
</head>

<script>
    // Logic การจัดการ Dropdown มีเงื่อนไข (NELM Subclass)
    function updateNelmSubclass(nelmValue) {
        const sub = document.getElementById('addNelmSubclass');
        sub.innerHTML = '';
        if(nelmValue === 'ED') {
            ['b','s','ex','R1','R2'].forEach(v => sub.add(new Option(v, v)));
        } else {
            sub.add(new Option(nelmValue, nelmValue));
        }
    }
